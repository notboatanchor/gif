# gif — Docker Compose
# Standalone development environment: PostgreSQL + GIF MCP server.
# Initializes the gif database automatically on first run (empty volume).
#
# Quick start:
#   cp .env.example .env        # fill in passwords
#   docker compose up -d
#
# Run integration tests (from mcp-server/):
#   source ../.env
#   PGHOST=localhost PGPORT=$PGPORT_HOST \
#   PGPASSWORD=$GIF_APP_PASSWORD PGADMINPASSWORD=$GIF_ADMIN_PASSWORD \
#   IDENTITY_HMAC_SECRET=$IDENTITY_HMAC_SECRET npm test
#
# Reset database (destructive — drops all data):
#   docker compose down -v && docker compose up -d

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:         ${PGDATABASE:-gif}
      POSTGRES_PASSWORD:   ${POSTGRES_PASSWORD}
      GIF_ADMIN_PASSWORD:  ${GIF_ADMIN_PASSWORD}
      GIF_APP_PASSWORD:    ${GIF_APP_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./schema:/schema:ro
    ports:
      - "${PGPORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${PGDATABASE:-gif}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    environment:
      PGHOST:               postgres
      PGPORT:               5432
      PGDATABASE:           ${PGDATABASE:-gif}
      PGUSER:               gif_app
      PGPASSWORD:           ${GIF_APP_PASSWORD}
      # PORT is intentionally NOT passed through. The container always listens
      # on the default 3100 internally; the host-side mapping below selects
      # which port on your machine reaches it.
      IDENTITY_HMAC_SECRET: ${IDENTITY_HMAC_SECRET}
    ports:
      - "${PORT:-3100}:3100"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
